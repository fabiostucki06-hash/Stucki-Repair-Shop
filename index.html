<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#F2F2F7"/>
<title>GarageOS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<style>
/* ── Apple Design System ── */
:root {
  /* Apple HIG System Colors */
  --blue:      #0071E3;
  --blue-d:    #0077ED;
  --green:     #34C759;
  --orange:    #FF9500;
  --red:       #FF3B30;
  --purple:    #AF52DE;
  --teal:      #32ADE6;
  --yellow:    #FFCC00;
  --indigo:    #5856D6;

  /* Apple.com Text Colors */
  --label:     #1D1D1F;
  --label2:    #6E6E73;
  --label3:    rgba(60,60,67,0.30);
  --label4:    rgba(60,60,67,0.18);

  --fill1:     rgba(120,120,128,0.20);
  --fill2:     rgba(120,120,128,0.16);
  --fill3:     rgba(118,118,128,0.12);
  --fill4:     rgba(116,116,128,0.06);

  /* Apple.com Surfaces – bright & airy */
  --bg:        #FFFFFF;
  --bg2:       #F0F6FF;
  --bg3:       #F8FAFF;
  --grouped-bg:  #EFF5FF;
  --grouped-bg2: #FFFFFF;

  --sep:       rgba(0,80,200,0.07);
  --sep-opaque:#C8D5E8;

  /* Apple Premium Shadows */
  --shadow-sm:  0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:  0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
  --shadow-lg:  0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
  --shadow-xl:  0 20px 60px rgba(0,0,0,0.14), 0 4px 16px rgba(0,0,0,0.08);

  --sidebar-width: 260px;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 18px;
  --radius-xl: 22px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --blue:     #2997FF;
    --blue-d:   #0071E3;
    --green:    #30D158;
    --orange:   #FF9F0A;
    --red:      #FF453A;
    --purple:   #BF5AF2;
    --teal:     #64D2FF;
    --yellow:   #FFD60A;
    --indigo:   #5E5CE6;

    --label:    #F5F5F7;
    --label2:   #A1A1A6;
    --label3:   rgba(235,235,245,0.30);
    --label4:   rgba(235,235,245,0.18);

    --fill1:    rgba(120,120,128,0.36);
    --fill2:    rgba(120,120,128,0.28);
    --fill3:    rgba(118,118,128,0.20);
    --fill4:    rgba(116,116,128,0.12);

    --bg:       #000000;
    --bg2:      #1C1C1E;
    --bg3:      #111111;
    --grouped-bg:  #000000;
    --grouped-bg2: #1C1C1E;

    --sep:       rgba(255,255,255,0.10);
    --sep-opaque:#38383A;

    --shadow-sm:  0 1px 3px rgba(0,0,0,0.30), 0 1px 2px rgba(0,0,0,0.20);
    --shadow-md:  0 4px 16px rgba(0,0,0,0.40), 0 1px 4px rgba(0,0,0,0.20);
    --shadow-lg:  0 8px 32px rgba(0,0,0,0.50), 0 2px 8px rgba(0,0,0,0.30);
    --shadow-xl:  0 20px 60px rgba(0,0,0,0.60), 0 4px 16px rgba(0,0,0,0.40);
  }
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
  background:var(--grouped-bg);
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  color:var(--label);
  font-size:17px;
  line-height:1.47059;
}
input,textarea,select{font-family:inherit;font-size:17px!important;color:var(--label)}
button{touch-action:manipulation;-webkit-font-smoothing:antialiased;font-family:inherit}

/* Apple-style scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--sep-opaque);border-radius:10px}
::-webkit-scrollbar-track{background:transparent}

/* ── TYPOGRAPHY – Apple Scale ── */
.sf-title1   {font-size:28px;font-weight:700;letter-spacing:-0.5px;line-height:1.21}
.sf-title2   {font-size:22px;font-weight:700;letter-spacing:-0.3px;line-height:1.27}
.sf-title3   {font-size:20px;font-weight:600;letter-spacing:-0.2px;line-height:1.3}
.sf-headline {font-size:17px;font-weight:600;letter-spacing:-0.4px;line-height:1.29}
.sf-body     {font-size:17px;font-weight:400;letter-spacing:-0.4px;line-height:1.47}
.sf-callout  {font-size:16px;font-weight:400;letter-spacing:-0.3px;line-height:1.38}
.sf-subhead  {font-size:15px;font-weight:400;letter-spacing:-0.2px;line-height:1.47}
.sf-footnote {font-size:13px;font-weight:400;letter-spacing:-0.1px;line-height:1.38}
.sf-caption1 {font-size:12px;font-weight:400;letter-spacing:0px;line-height:1.33}
.sf-caption2 {font-size:11px;font-weight:400;letter-spacing:0.06px;line-height:1.27}

/* ── GROUPED LIST SECTIONS ── */
.section-header {
  font-size:12px;font-weight:600;color:var(--label2);
  letter-spacing:0.6px;text-transform:uppercase;
  padding:20px 20px 8px;
}
.inset-grouped-list {
  background:var(--grouped-bg2);
  border-radius:var(--radius-md);
  overflow:hidden;
  margin-bottom:28px;
  box-shadow:var(--shadow-sm);
}
.list-row {
  display:flex;align-items:center;gap:14px;
  padding:13px 20px;
  min-height:48px;
  border-bottom:0.5px solid var(--sep);
  cursor:pointer;
  background:var(--grouped-bg2);
  transition:background 0.12s ease;
  position:relative;
}
.list-row:last-child{border-bottom:none}
.list-row:active,.list-row.pressed{background:var(--fill4)}
.list-row-icon {
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.list-chevron{color:var(--sep-opaque);font-size:14px;font-weight:700;margin-left:auto;flex-shrink:0;opacity:0.7}

/* ── NAVIGATION BAR – Apple Glassmorphism ── */
.nav-bar {
  position:sticky;top:0;z-index:200;
  background:rgba(240,246,255,0.88);
  -webkit-backdrop-filter:saturate(200%) blur(28px);
  backdrop-filter:saturate(200%) blur(28px);
  border-bottom:0.5px solid var(--sep);
  padding-top:env(safe-area-inset-top);
}
@media (prefers-color-scheme:dark){
  .nav-bar{background:rgba(0,0,0,0.82);border-bottom-color:rgba(255,255,255,0.08)}
}
.nav-bar-inner{
  height:48px;display:flex;align-items:center;
  padding:0 20px;position:relative;
  max-width:960px;margin:0 auto;
}
.nav-large-title{
  padding:2px 20px 12px;
  max-width:960px;margin:0 auto;
}

/* ── TAB BAR – Apple Premium ── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(240,246,255,0.92);
  -webkit-backdrop-filter:saturate(200%) blur(28px);
  backdrop-filter:saturate(200%) blur(28px);
  border-top:0.5px solid rgba(0,80,200,0.10);
  padding-bottom:env(safe-area-inset-bottom);
  display:flex;
}
@media (prefers-color-scheme:dark){
  .tab-bar{background:rgba(0,0,0,0.88);border-top-color:rgba(255,255,255,0.08)}
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 0 5px;min-height:52px;border:none;background:transparent;cursor:pointer;gap:2px;
  transition:opacity 0.1s;
}
.tab-item:active{opacity:0.6}
.tab-icon{font-size:24px;line-height:1;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.tab-label{font-size:10px;font-weight:500;letter-spacing:-0.1px;margin-top:2px}

/* ── SF SYMBOLS (SVG) ── */
.sf-symbol{display:inline-flex;align-items:center;justify-content:center}

/* ── BUTTONS – Apple Premium Style ── */
.btn-system{
  background:var(--blue);color:#fff;border:none;
  border-radius:980px;padding:0 24px;height:52px;
  font-size:17px;font-weight:600;letter-spacing:-0.4px;
  cursor:pointer;width:100%;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.18s cubic-bezier(0.25,0.46,0.45,0.94);
  box-shadow:0 2px 8px rgba(0,113,227,0.30);
}
.btn-system:hover{background:var(--blue-d);box-shadow:0 4px 16px rgba(0,113,227,0.35);transform:translateY(-1px)}
.btn-system:active{opacity:0.82;transform:scale(0.98);box-shadow:none}
.btn-system:disabled{opacity:0.32;box-shadow:none;transform:none}
.btn-system.btn-secondary{
  background:var(--fill3);color:var(--blue);
  box-shadow:none;
}
.btn-system.btn-secondary:hover{background:var(--fill2);box-shadow:none;transform:none}
.btn-system.btn-destructive{background:var(--fill3);color:var(--red);box-shadow:none}
.btn-system.btn-destructive:hover{background:rgba(255,59,48,0.10);box-shadow:none;transform:none}
.btn-system.btn-green{
  background:var(--green);
  box-shadow:0 2px 8px rgba(52,199,89,0.30);
}
.btn-tinted{
  background:rgba(0,113,227,0.10);color:var(--blue);border:none;
  border-radius:980px;padding:0 20px;height:44px;
  font-size:17px;font-weight:600;letter-spacing:-0.4px;
  cursor:pointer;
  transition:background 0.15s ease;
}
.btn-tinted:hover{background:rgba(0,113,227,0.16)}
.btn-tinted:active{background:rgba(0,113,227,0.22)}
.btn-plain{
  background:none;border:none;color:var(--blue);
  font-size:17px;font-weight:400;letter-spacing:-0.4px;
  cursor:pointer;padding:0;
  transition:opacity 0.12s;
}
.btn-plain:active{opacity:0.5}
.bar-btn{
  background:none;border:none;color:var(--blue);
  font-size:17px;font-weight:600;letter-spacing:-0.4px;cursor:pointer;
  padding:0 4px;min-width:44px;min-height:44px;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.12s;
  border-radius:8px;
}
.bar-btn:hover{background:var(--fill4)}
.bar-btn:active{opacity:0.5}

/* ── FORM INPUTS – Apple Refined ── */
.text-field{
  background:var(--grouped-bg2);border:none;
  border-bottom:0.5px solid var(--sep);
  width:100%;padding:13px 20px;
  font-size:17px;font-weight:400;letter-spacing:-0.4px;
  color:var(--label);outline:none;
}
.text-field:last-of-type,.text-field-last{border-bottom:none}
.text-field::placeholder{color:var(--label3)}

.text-field-standalone{
  background:var(--grouped-bg2);border:none;
  border-radius:var(--radius-md);
  width:100%;padding:13px 20px;
  font-size:17px;color:var(--label);outline:none;
  display:block;
  box-shadow:var(--shadow-sm);
  border:0.5px solid var(--sep);
}
.text-field-standalone::placeholder{color:var(--label3)}
.text-field-standalone:focus{
  outline:none;
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(0,113,227,0.18), var(--shadow-sm);
}

.form-section{
  background:var(--grouped-bg2);
  border-radius:var(--radius-md);
  overflow:hidden;
  margin-bottom:24px;
  box-shadow:var(--shadow-sm);
}

/* ── SEARCH BAR – Apple Style ── */
.search-bar-wrap{padding:10px 20px 6px}
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--fill3);border-radius:12px;
  padding:9px 14px;
}
.search-bar input{
  background:none;border:none;outline:none;flex:1;
  font-size:17px;color:var(--label);
}
.search-bar input::placeholder{color:var(--label2)}
.search-icon{color:var(--label2);font-size:16px}

/* ── CARDS & SURFACES – Premium Depth ── */
.card{
  background:var(--grouped-bg2);border-radius:var(--radius-md);
  overflow:hidden;margin-bottom:10px;
  box-shadow:var(--shadow-sm);
}
.card-padded{padding:20px}
.inset-card{
  background:var(--grouped-bg2);border-radius:var(--radius-md);
  padding:20px;margin-bottom:10px;
  box-shadow:var(--shadow-sm);
}

/* ── BADGES – Apple Pill Style ── */
.badge{
  display:inline-flex;align-items:center;
  border-radius:980px;padding:4px 12px;
  font-size:12px;font-weight:600;white-space:nowrap;
  letter-spacing:-0.05px;
}

/* ── STATUS PILL COLORS ── */
.status-aufnahme      {background:rgba(88,86,214,0.10);color:#5856D6}
.status-offerte_versendet{background:rgba(255,149,0,0.10);color:#E07800}
.status-offerte_bestaetigt{background:rgba(52,199,89,0.10);color:#248A3D}
.status-teile_arbeit  {background:rgba(0,113,227,0.10);color:#0071E3}
.status-zahlung_versendet{background:rgba(255,149,0,0.10);color:#E07800}
.status-zahlung_erhalten{background:rgba(175,82,222,0.10);color:#9842C8}
.status-abgeschlossen {background:rgba(110,110,115,0.10);color:var(--label2)}

@media(prefers-color-scheme:dark){
  .status-aufnahme{background:rgba(94,92,230,0.18);color:#7D7AFF}
  .status-offerte_versendet{background:rgba(255,159,10,0.18);color:#FF9F0A}
  .status-offerte_bestaetigt{background:rgba(48,209,88,0.18);color:#30D158}
  .status-teile_arbeit{background:rgba(41,151,255,0.18);color:#2997FF}
  .status-zahlung_versendet{background:rgba(255,159,10,0.18);color:#FF9F0A}
  .status-zahlung_erhalten{background:rgba(191,90,242,0.18);color:#BF5AF2}
  .status-abgeschlossen{background:rgba(120,120,128,0.18)}
}

/* ── ALERTS / BANNERS ── */
.alert-banner{
  border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:14px;
  display:flex;align-items:flex-start;gap:12px;
  box-shadow:var(--shadow-sm);
}
.alert-warning{background:rgba(255,149,0,0.09);color:#C67000;border:0.5px solid rgba(255,149,0,0.20)}
.alert-danger  {background:rgba(255,59,48,0.09);color:#CC2200;border:0.5px solid rgba(255,59,48,0.20)}
@media(prefers-color-scheme:dark){
  .alert-warning{color:#FF9F0A;border-color:rgba(255,159,10,0.25)}
  .alert-danger{color:#FF453A;border-color:rgba(255,69,58,0.25)}
}

/* ── STAT CARDS – Apple Premium ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{
  background:var(--grouped-bg2);border-radius:var(--radius-lg);
  padding:18px;overflow:hidden;position:relative;
  box-shadow:var(--shadow-md);
}
.stat-icon{font-size:30px;margin-bottom:8px}
.stat-number{font-size:30px;font-weight:700;letter-spacing:-0.5px;line-height:1}
.stat-label{font-size:13px;font-weight:500;color:var(--label2);margin-top:5px;letter-spacing:-0.1px}

/* ── FLOATING CONTEXT MENU – Apple Premium ── */
.context-menu{
  position:fixed;
  background:rgba(240,246,255,0.92);
  -webkit-backdrop-filter:saturate(200%) blur(40px);
  backdrop-filter:saturate(200%) blur(40px);
  border-radius:var(--radius-lg);
  overflow:hidden;
  z-index:500;
  min-width:240px;
  box-shadow:var(--shadow-xl), 0 0 0 0.5px var(--sep);
}
@media(prefers-color-scheme:dark){
  .context-menu{background:rgba(30,30,32,0.92)}
}
.context-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;min-height:48px;
  font-size:17px;font-weight:400;letter-spacing:-0.4px;
  color:var(--label);background:none;border:none;width:100%;cursor:pointer;
  border-bottom:0.5px solid var(--sep);
  gap:10px;
  transition:background 0.1s;
}
.context-item:last-child{border-bottom:none}
.context-item:active{background:var(--fill3)}
.context-item-icon{font-size:18px;color:var(--label2)}

/* ── MODAL / SHEET – Apple Spring ── */
.sheet-backdrop{
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,0.36);
  -webkit-backdrop-filter:blur(2px);
  backdrop-filter:blur(2px);
}
.sheet-container{
  position:fixed;left:0;right:0;bottom:0;z-index:401;
  background:var(--grouped-bg);
  border-radius:20px 20px 0 0;
  max-height:96dvh;display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -2px 40px rgba(0,0,0,0.12);
}
.sheet-handle{
  width:40px;height:5px;background:var(--sep-opaque);
  border-radius:3px;margin:10px auto 0;flex-shrink:0;opacity:0.5;
}
.sheet-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:0.5px solid var(--sep);flex-shrink:0;
  min-height:48px;
}
.sheet-content{
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  flex:1;padding:24px 20px;
}

/* ── SEGMENTED CONTROL – Apple HIG ── */
.seg-ctrl{
  display:inline-flex;
  background:var(--fill3);
  border-radius:10px;padding:3px;
  gap:0;
}
.seg-item{
  flex:1;height:34px;border:none;border-radius:8px;
  font-size:13px;font-weight:600;letter-spacing:-0.1px;cursor:pointer;
  transition:background 0.18s cubic-bezier(0.25,0.46,0.45,0.94),
             box-shadow 0.18s cubic-bezier(0.25,0.46,0.45,0.94);
  background:transparent;color:var(--label2);
  padding:0 16px;white-space:nowrap;
}
.seg-item.active{
  background:var(--grouped-bg2);color:var(--label);
  box-shadow:0 2px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.06);
}

/* ── SCROLL AREA ── */
.h-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.h-scroll::-webkit-scrollbar{display:none}

/* ── ANIMATIONS – Apple Spring Curves ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes sheet-in{
  from{transform:translateY(100%);opacity:0.6}
  to{transform:translateY(0);opacity:1}
}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes pop-in{
  from{opacity:0;transform:scale(0.88)}
  to{opacity:1;transform:scale(1)}
}
@keyframes slide-up{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

.sheet-container{animation:sheet-in 0.42s cubic-bezier(0.32,0.72,0,1)}
.context-menu{animation:pop-in 0.22s cubic-bezier(0.34,1.56,0.64,1)}

/* ── OVERDUE DOT ── */
.overdue-dot{
  width:8px;height:8px;border-radius:50%;background:var(--red);
  display:inline-block;flex-shrink:0;
}

/* ── LOGIN PAGE – Apple Premium ── */
.login-logo{
  font-size:48px;margin-bottom:8px;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.15));
}
.login-card{
  background:rgba(255,255,255,0.96);
  border-radius:var(--radius-xl);
  padding:36px 32px;
  box-shadow:var(--shadow-xl), 0 0 0 0.5px rgba(0,80,200,0.08);
  border:0.5px solid rgba(0,80,200,0.10);
  width:100%;max-width:380px;
}

@media(max-width:640px){
  .two-col{grid-template-columns:1fr!important}
  .login-card{border-radius:var(--radius-lg);padding:28px 24px}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
function _optionalChain(ops){let lastAccessLHS=undefined;let value=ops[0];let i=1;while(i<ops.length){const op=ops[i];const fn=ops[i+1];i+=2;if((op==='optionalAccess'||op==='optionalCall')&&value==null){return undefined;}if(op==='access'||op==='optionalAccess'){lastAccessLHS=value;value=fn(value);}else if(op==='call'||op==='optionalCall'){value=fn((...args)=>value.call(lastAccessLHS,...args));lastAccessLHS=undefined;}}return value;}
const{useState,useEffect,useRef,useCallback}=React;

const daysSince=d=>d?Math.floor((Date.now()-new Date(d).getTime())/86400000):0;
const hoursSince=d=>d?Math.floor((Date.now()-new Date(d).getTime())/3600000):0;
const isOverdue=o=>{
  if(o.status==="offerte_versendet"&&hoursSince(o.statusChangedAt)>48)return true;
  if(o.status==="zahlung_versendet"){const f=o.zahlungsFrist?parseInt(o.zahlungsFrist):10;if(daysSince(o.statusChangedAt)>f)return true;}
  return false;
};
const needsAttention=o=>o.status!=="abgeschlossen"&&isOverdue(o);
const getActiveStatus=(orders,cid)=>{
  const a=orders.filter(o=>o.customerId===cid&&o.status!=="abgeschlossen");
  if(!a.length)return null;
  return a.sort((x,y)=>new Date(y.createdAt)-new Date(x.createdAt))[0].status;
};

/* ── KI ZE ESTIMATION ── */
function schaetzeZE(beschreibung){
  const t=beschreibung.toLowerCase();
  const rules=[[/oelwechsel|ölwechsel/,2],[/inspektion|service/,6],[/bremsen|bremsbelag/,4],[/reifen|pneu/,2],[/getriebe/,10],[/kupplung/,8],[/zahnriemen/,8],[/batterie/,1],[/diagnose/,1],[/klima/,3]];
  for(const[re,ze]of rules)if(re.test(t))return String(ze);
  return "1";
}
async function schaetzeZEmitKI(beschreibung,fahrzeug){
  const fz=[fahrzeug.marke,fahrzeug.modell,fahrzeug.kennzeichen,fahrzeug.km?fahrzeug.km+"km":""].filter(Boolean).join(" ")||"unbekannt";
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:150,
      messages:[{role:"user",content:`Du bist Automechaniker Schweiz. Schätze ZE (1 ZE=0.6min) für:\nFahrzeug: ${fz}\nArbeit: ${beschreibung}\nNur JSON: {"ze":<Zahl>,"begruendung":"<max 60 Zeichen>"}`}]})
  });
  const data=await res.json();
  const text=(data.content||[]).map(b=>b.text||"").join("");
  const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
  return{ze:String(Math.round(parsed.ze)),begruendung:parsed.begruendung};
}

function App(){
  const[token,setToken]=useState(()=>localStorage.getItem("garage_token")||null);
  const[userEmail,setUserEmail]=useState(()=>localStorage.getItem("garage_email")||null);
  const[authChecked,setAuthChecked]=useState(false);

  const[orders,setOrders]=useState([]);
  const[orderNum,setOrderNum]=useState(0);
  const[loading,setLoading]=useState(true);
  const[syncStatus,setSyncStatus]=useState("ok");
  const[showNC,setShowNC]=useState(false);
  const[showNO,setShowNO]=useState(false);
  const[newOCid,setNewOCid]=useState(null);
  const[selC,setSelC]=useState(null);
  const[editC,setEditC]=useState(null);
  const[selO,setSelO]=useState(null);
  const[afterSave,setAfterSave]=useState(null);
  const[search,setSearch]=useState("");
  const[filterK,setFilterK]=useState("all");
  const[fabOpen,setFabOpen]=useState(false);
  const[offerten,setOfferten]=useState([]);
  const[showNOff,setShowNOff]=useState(false);
  const[selOff,setSelOff]=useState(null);
  const[offertNum,setOffertNum]=useState(0);

  useEffect(()=>{
    if(!token){setAuthChecked(true);return;}
    auth.getUser(token).then(u=>{
      if(u.error||!u.email){localStorage.removeItem("garage_token");localStorage.removeItem("garage_email");setToken(null);setUserEmail(null);}
      setAuthChecked(true);
    });
  },[]);

  useEffect(()=>{
    if(!token||!authChecked)return;
    (async()=>{
      try{
        const[cr,or,cnt,offr]=await Promise.all([db.get("customers",token),db.get("orders",token),db.getCounter(token),db.get("offerten",token).catch(()=>[])]);
        setCustomers((Array.isArray(cr)?cr:[]).map(r=>r.data));
        setOrders((Array.isArray(or)?or:[]).map(r=>r.data));
        setOrderNum(cnt);
        const offs=(Array.isArray(offr)?offr:[]).map(r=>r.data).filter(Boolean);
        setOfferten(offs);
        if(offs.length)setOffertNum(Math.max(...offs.map(o=>o.offertNumber||0)));
      }catch(e){console.error(e);}
      setLoading(false);
    })();
  },[token,authChecked]);

  function handleLogin(t,e){setToken(t);setUserEmail(e);setLoading(true);}
  async function handleLogout(){
    if(!window.confirm("Abmelden?"))return;
    await auth.signOut(token);
    localStorage.removeItem("garage_token");localStorage.removeItem("garage_email");
    setToken(null);setUserEmail(null);setCustomers([]);setOrders([]);
  }
  async function syncOk(fn){
    setSyncStatus("saving");
    try{await fn();setSyncStatus("ok");}
    catch(e){console.error(e);setSyncStatus("error");alert("Fehler beim Speichern!");}
  }
  async function addCustomer(data){
    const id=`c_${Date.now()}`;const newC={id,...data,createdAt:new Date().toISOString()};
    await syncOk(()=>db.upsert("customers",{id,data:newC},token));
    setCustomers(p=>[...p,newC]);setShowNC(false);setAfterSave(id);
  }
  async function updateCustomer(id,data){
    const updated={...customers.find(c=>c.id===id),...data};
    await syncOk(()=>db.upsert("customers",{id,data:updated},token));
    setCustomers(p=>p.map(c=>c.id===id?updated:c));
  }
  async function addOrder(data){
    const num=orderNum+1;
    const newO={id:`o_${Date.now()}`,orderNumber:num,status:"aufnahme",statusChangedAt:new Date().toISOString(),createdAt:new Date().toISOString(),...data};
    await syncOk(async()=>{await db.upsert("orders",{id:newO.id,data:newO},token);await db.setCounter(num,token);});
    setOrders(p=>[...p,newO]);setOrderNum(num);setShowNO(false);setNewOCid(null);setAfterSave(null);
  }
  async function updateOrder(upd,cp){
    await syncOk(()=>db.upsert("orders",{id:upd.id,data:upd},token));
    setOrders(p=>p.map(o=>o.id===upd.id?upd:o));setSelO(upd);
    if(cp)await updateCustomer(upd.customerId,cp);
  }
  async function addOfferte(data){
    const num=offertNum+1;
    const newOff={id:`off_${Date.now()}`,offertNumber:num,status:"entwurf",createdAt:new Date().toISOString(),...data};
    await syncOk(()=>db.upsert("offerten",{id:newOff.id,data:newOff},token));
    setOfferten(p=>[...p,newOff]);setOffertNum(num);setShowNOff(false);
  }
  async function updateOfferte(upd){
    await syncOk(()=>db.upsert("offerten",{id:upd.id,data:upd},token));
    setOfferten(p=>p.map(o=>o.id===upd.id?upd:o));setSelOff(upd);
  }
  async function deleteOfferte(id){
    await syncOk(()=>db.delete("offerten",id,token));
    setOfferten(p=>p.filter(o=>o.id!==id));setSelOff(null);
  }
