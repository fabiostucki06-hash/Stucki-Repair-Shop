// ── ZE SCHÄTZUNG ─────────────────────────────────────────────────────────────
function schaetzeZE(beschreibung){
  const t = beschreibung.toLowerCase();
  // Bekannte Arbeiten mit typischen ZE-Werten
  const regeln = [
    [/oelwechsel|ölwechsel|oil change/,2],
    [/inspektion|service|jahresservice/,6],
    [/bremsen|bremsbelag|bremse/,4],
    [/reifen|pneu|reifenwechsel/,2],
    [/getriebe/,10],
    [/kupplung|clutch/,8],
    [/zahnriemen|timing/,8],
    [/stossdaempfer|stossdämpfer|shock/,5],
    [/lenkung/,4],
    [/auspuff|exhaust/,3],
    [/batterie|akku/,1],
    [/lampe|licht|birne/,1],
    [/diagnose|fehler|auslesen/,1],
    [/klimaanlage|klima|ac /,3],
    [/wasserp|kühlwasser/,5],
    [/achse|radlager/,4],
    [/karosserie|delle|beule/,6],
  ];
  for(const [re, ze] of regeln){
    if(re.test(t)) return String(ze);
  }
  // Standard: 1 ZE für unbekannte Arbeiten
  return "1";
}

// ── EXCEL EXPORT ──────────────────────────────────────────────────────────────
function exportOfferteExcel(offerte, customer){
  const wb = XLSX.utils.book_new();
  const firmaName = "Stucki Repair Shop";
  const datum = new Date(offerte.createdAt).toLocaleDateString("de-CH");
  const gueltigBis = offerte.gueltigBis ? new Date(offerte.gueltigBis).toLocaleDateString("de-CH") : "–";
  const wsData = [
    [firmaName, "", "", ""],
    ["", "", "", ""],
    ["OFFERTE", "", "", "Offerte #" + offerte.offertNumber],
    ["Datum:", datum, "", "Gültig bis: " + gueltigBis],
    ["", "", "", ""],
    ["KUNDE", "", "", ""],
    ["Name:", customer ? (customer.vorname + " " + customer.nachname) : "–", "", ""],
    ["Telefon:", customer ? customer.telefon : "–", "", ""],
    ["Fahrzeug:", customer ? ((customer.marke||"") + " " + (customer.modell||"")).trim() || "–" : "–", "", ""],
    ["Kennzeichen:", customer ? customer.kennzeichen : "–", "", ""],
    ["", "", "", ""],
    ["POSITIONEN", "", "", ""],
    ["Beschreibung", "Menge", "Stückpreis CHF", "Total CHF", "Arbeitszeit (ZE)"],
  ];
  (offerte.positionen || []).forEach(function(pos){
    const menge = parseFloat(pos.menge || 1);
    const stueck = parseFloat(pos.stueckpreis || pos.preis || 0);
    const total = parseFloat(pos.preis || (menge * stueck));
    const ze = pos.ze ? (parseFloat(pos.ze) + " ZE (" + ((parseFloat(pos.ze)||0)*0.75).toFixed(1) + " h)") : "–";
    wsData.push([pos.beschreibung, menge, stueck.toFixed(2), total.toFixed(2), ze]);
  });
  wsData.push(["", "", "", ""]);
  wsData.push(["", "", "TOTAL CHF:", parseFloat(offerte.totalBetrag || 0).toFixed(2)]);
  if(offerte.notizen){
    wsData.push(["", "", "", ""]);
    wsData.push(["Notizen:", offerte.notizen, "", ""]);
  }
  wsData.push(["", "", "", ""]);
  wsData.push(["", "", "", "Unterschrift: ____________________"]);
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws["!cols"] = [{wch:32},{wch:10},{wch:14},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws, "Offerte");
  XLSX.writeFile(wb, "Offerte_" + offerte.offertNumber + "_" + (customer ? customer.nachname : "Kunde") + ".xlsx");
}
