const daysSince=d=>d?Math.floor((Date.now()-new Date(d).getTime())/86400000):0;
const hoursSince=d=>d?Math.floor((Date.now()-new Date(d).getTime())/3600000):0;
const isOverdue=o=>{
  if(o.status==="offerte_versendet"&&hoursSince(o.statusChangedAt)>48)return true;
  if(o.status==="zahlung_versendet"){
    const frist=o.zahlungsFrist?parseInt(o.zahlungsFrist):10;
    if(daysSince(o.statusChangedAt)>frist)return true;
  }
  return false;
};
const paymentDueText=o=>{
  if(o.status!=="zahlung_versendet"&&o.status!=="zahlung_erhalten")return "";
  if(o.status==="zahlung_erhalten")return "Zahlung erhalten";
  const frist=parseInt(o.zahlungsFrist||"10");
  const rest=frist-daysSince(o.statusChangedAt);
  if(rest<0)return `Zahlung: ${Math.abs(rest)} Tage überfällig`;
  if(rest===0)return "Zahlung: heute fällig";
  if(rest===1)return "Zahlung: noch 1 Tag";
  return `Zahlung: noch ${rest} Tage`;
};
const needsAttention=o=>o.status!=="abgeschlossen"&&isOverdue(o);
const getActiveStatus=(orders,cid)=>{
  const a=orders.filter(o=>o.customerId===cid&&o.status!=="abgeschlossen");
  if(!a.length)return null;

};
