<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#F2F2F7"/>
<title>GarageOS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<style>
/* ── Liquid Glass Design System ── */
:root {
  --blue:      #007AFF;
  --blue-d:    #0060CC;
  --green:     #34C759;
  --orange:    #FF9500;
  --red:       #FF3B30;
  --purple:    #AF52DE;
  --teal:      #32ADE6;
  --yellow:    #FFCC00;
  --indigo:    #5856D6;

  --label:     #1D1D1F;
  --label2:    #6E6E73;
  --label3:    rgba(60,60,67,0.30);
  --label4:    rgba(60,60,67,0.18);

  --fill1:     rgba(255,255,255,0.65);
  --fill2:     rgba(255,255,255,0.55);
  --fill3:     rgba(255,255,255,0.45);
  --fill4:     rgba(255,255,255,0.30);

  --bg:        transparent;
  --bg2:       rgba(240,244,255,0.55);
  --bg3:       rgba(251,251,253,0.55);
  --grouped-bg:   transparent;
  --grouped-bg2:  rgba(255,255,255,0.55);

  --sep:       rgba(0,0,0,0.08);
  --sep-opaque:#D2D2D7;

  /* Liquid Glass tokens – Apple Aqua */
  --glass-light: rgba(255,255,255,0.45);
  --glass-border: 1px solid rgba(255,255,255,0.60);
  --glass-shine:  inset 0 1px 0 rgba(255,255,255,0.70), inset 0 -1px 2px rgba(0,0,0,0.06);
  --glass-blur:   blur(20px);

  --shadow-sm:  0 8px 32px 0 rgba(0,0,0,0.10),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:  0 8px 32px 0 rgba(0,0,0,0.14),0 2px 8px rgba(0,0,0,0.07);
  --shadow-lg:  0 12px 40px 0 rgba(0,0,0,0.18),0 3px 12px rgba(0,0,0,0.09);
  --shadow-xl:  0 24px 64px 0 rgba(0,0,0,0.22),0 6px 20px rgba(0,0,0,0.12);

  --sidebar-width: 260px;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 18px;
  --radius-xl: 22px;
}

/* Dark mode intentionally disabled – light/glass only */

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
  background:transparent;
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  color:var(--label);
  font-size:17px;
  line-height:1.47059;
}
/* ── BACKGROUND IMAGES ── */
.bg{position:fixed;inset:0;z-index:-1;overflow:hidden;display:flex;}
.bg img{flex:1;object-fit:cover;height:100%;min-width:0;}
input,textarea,select{font-family:inherit;font-size:17px!important;color:var(--label)}
button{touch-action:manipulation;-webkit-font-smoothing:antialiased;font-family:inherit}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--sep-opaque);border-radius:10px}
::-webkit-scrollbar-track{background:transparent}

/* ── TYPOGRAPHY ── */
.sf-title1   {font-size:28px;font-weight:700;letter-spacing:-0.5px;line-height:1.21}
.sf-title2   {font-size:22px;font-weight:700;letter-spacing:-0.3px;line-height:1.27}
.sf-title3   {font-size:20px;font-weight:600;letter-spacing:-0.2px;line-height:1.3}
.sf-headline {font-size:17px;font-weight:600;letter-spacing:-0.4px;line-height:1.29}
.sf-body     {font-size:17px;font-weight:400;letter-spacing:-0.4px;line-height:1.47}
.sf-callout  {font-size:16px;font-weight:400;letter-spacing:-0.3px;line-height:1.38}
.sf-subhead  {font-size:15px;font-weight:400;letter-spacing:-0.2px;line-height:1.47}
.sf-footnote {font-size:13px;font-weight:400;letter-spacing:-0.1px;line-height:1.38}
.sf-caption1 {font-size:12px;font-weight:400;letter-spacing:0px;line-height:1.33}
.sf-caption2 {font-size:11px;font-weight:400;letter-spacing:0.06px;line-height:1.27}

/* ── GROUPED LIST SECTIONS ── */
.section-header {
  font-size:12px;font-weight:600;color:var(--label2);
  letter-spacing:0.6px;text-transform:uppercase;
  padding:20px 20px 8px;
}
.inset-grouped-list {
  background:rgba(255,255,255,0.45);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  backdrop-filter:blur(20px) saturate(180%);
  border-radius:var(--radius-md);
  border:1px solid rgba(255,255,255,0.60);
  overflow:hidden;
  margin-bottom:28px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.70),inset 0 -1px 2px rgba(0,0,0,0.04),var(--shadow-sm);
}
.list-row {
  display:flex;align-items:center;gap:14px;
  padding:13px 20px;
  min-height:48px;
  border-bottom:0.5px solid var(--sep);
  cursor:pointer;
  background:transparent;
  transition:background 0.18s ease,transform 0.22s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.18s ease;
  position:relative;
}
.list-row:hover{background:rgba(0,122,255,0.055);transform:translateX(3px);box-shadow:inset 3px 0 0 var(--blue);}
.list-row:last-child{border-bottom:none}
.list-row:last-child:hover{border-radius:0 0 var(--radius-md) var(--radius-md);}
.list-row:active,.list-row.pressed{background:rgba(0,0,0,0.05);transform:translateX(1px);}
.list-row-icon {
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.list-chevron{color:var(--sep-opaque);font-size:14px;font-weight:700;margin-left:auto;flex-shrink:0;opacity:0.7}

/* ── NAVIGATION BAR – Liquid Glass ── */
.nav-bar {
  position:sticky;top:0;z-index:200;
  background:rgba(255,255,255,0.45);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,0.60);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.70),0 8px 32px 0 rgba(0,0,0,0.08);
  padding-top:env(safe-area-inset-top);
}
.nav-bar-inner{
  height:60px;display:flex;align-items:center;
  padding:0 16px;position:relative;
  max-width:960px;margin:0 auto;
}
.nav-large-title{
  padding:2px 20px 12px;
  max-width:960px;margin:0 auto;
}

/* ── TAB BAR – Liquid Glass ── */
.tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,0.45);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  backdrop-filter:blur(20px) saturate(180%);
  border-top:1px solid rgba(255,255,255,0.60);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.70),0 -8px 32px 0 rgba(0,0,0,0.08);
  padding-bottom:env(safe-area-inset-bottom);
  display:flex;
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 0 5px;min-height:52px;border:none;background:transparent;cursor:pointer;gap:2px;
  transition:opacity 0.1s;
}
.tab-item:active{opacity:0.6}
.tab-icon{font-size:24px;line-height:1;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.tab-label{font-size:10px;font-weight:500;letter-spacing:-0.1px;margin-top:2px}

.sf-symbol{display:inline-flex;align-items:center;justify-content:center}

/* ── BUTTONS – Apple Aqua 3D ── */
.btn-system{
  background:linear-gradient(to bottom,rgba(84,164,255,0.95) 0%,rgba(0,122,255,0.95) 50%,rgba(0,86,179,0.95) 100%);
  color:#fff;border:1px solid #004fb0;
  border-radius:14px;padding:0 24px;height:52px;
  font-size:17px;font-weight:700;letter-spacing:-0.4px;
  cursor:pointer;width:100%;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.18s cubic-bezier(0.25,0.46,0.45,0.94);
  box-shadow:inset 0 1px 0px rgba(255,255,255,0.7),
             inset 0 -1px 2px rgba(0,0,0,0.15),
             0 4px 6px rgba(0,0,0,0.10);
  text-shadow:0 -1px 0 rgba(0,0,0,0.3);
}
.btn-system:hover{
  background:linear-gradient(to bottom,rgba(104,184,255,0.97) 0%,rgba(26,144,255,0.97) 50%,rgba(0,102,204,0.97) 100%);
  box-shadow:inset 0 1px 0px rgba(255,255,255,0.75),
             inset 0 -1px 2px rgba(0,0,0,0.18),
             0 6px 12px rgba(0,0,0,0.15);
  transform:translateY(-1px);
}
.btn-system:active{opacity:0.88;transform:scale(0.98);box-shadow:inset 0 1px 2px rgba(0,0,0,0.25),0 1px 3px rgba(0,0,0,0.10)}
.btn-system:disabled{opacity:0.32;box-shadow:none;transform:none}
.btn-system.btn-secondary{
  background:var(--glass-light);
  color:var(--blue);
  border:var(--glass-border);
  box-shadow:var(--glass-shine),var(--shadow-sm);
  text-shadow:none;
  -webkit-backdrop-filter:var(--glass-blur);
  backdrop-filter:var(--glass-blur);
}
.btn-system.btn-secondary:hover{
  background:rgba(255,255,255,0.88);
  box-shadow:var(--glass-shine),var(--shadow-md);
  transform:none;
}
.btn-system.btn-destructive{
  background:var(--glass-light);
  color:var(--red);
  border:var(--glass-border);
  box-shadow:var(--glass-shine),var(--shadow-sm);
  text-shadow:none;
  -webkit-backdrop-filter:var(--glass-blur);
  backdrop-filter:var(--glass-blur);
}
.btn-system.btn-destructive:hover{background:rgba(255,59,48,0.10);transform:none}
.btn-system.btn-green{
  background:linear-gradient(to bottom,rgba(76,217,110,0.95) 0%,rgba(52,199,89,0.95) 50%,rgba(34,160,69,0.95) 100%);
  border:1px solid #1a8035;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.65),
             inset 0 -1px 2px rgba(0,0,0,0.15),
             0 4px 6px rgba(0,0,0,0.10);
  text-shadow:0 -1px 0 rgba(0,0,0,0.25);
}
.btn-tinted{
  background:linear-gradient(to bottom,rgba(84,164,255,0.95) 0%,rgba(0,122,255,0.95) 50%,rgba(0,86,179,0.95) 100%);
  color:#fff;
  border:1px solid #004fb0;
  border-radius:10px;padding:0 20px;height:40px;
  font-size:15px;font-weight:700;letter-spacing:-0.3px;
  cursor:pointer;
  box-shadow:inset 0 1px 0px rgba(255,255,255,0.7),inset 0 -1px 2px rgba(0,0,0,0.15),0 3px 5px rgba(0,0,0,0.10);
  text-shadow:0 -1px 0 rgba(0,0,0,0.3);
  transition:all 0.15s ease;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
}
.btn-tinted:hover{background:linear-gradient(to bottom,rgba(104,184,255,0.97) 0%,rgba(26,144,255,0.97) 50%,rgba(0,102,204,0.97) 100%);transform:translateY(-1px);box-shadow:inset 0 1px 0px rgba(255,255,255,0.75),inset 0 -1px 2px rgba(0,0,0,0.15),0 5px 10px rgba(0,0,0,0.15)}
.btn-tinted:active{opacity:0.88;transform:scale(0.97)}

/* ── PILL STATUS BUTTONS ── */
.pill-btn{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  font-weight:600;font-size:13px;cursor:pointer;
  transition:all 0.15s ease;border:none;
}
.pill-btn-active{
  background:linear-gradient(to bottom,rgba(84,164,255,0.95) 0%,rgba(0,122,255,0.95) 50%,rgba(0,86,179,0.95) 100%);
  color:#fff;border:1px solid #004fb0;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.7),inset 0 -1px 2px rgba(0,0,0,0.15),0 3px 5px rgba(0,0,0,0.10);
  text-shadow:0 -1px 0 rgba(0,0,0,0.3);
}
.pill-btn-inactive{
  background:rgba(255,255,255,0.48);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  backdrop-filter:blur(20px) saturate(180%);
  color:var(--label2);
  border:1px solid rgba(255,255,255,0.60)!important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.70),0 2px 6px rgba(0,0,0,0.06);
}
.pill-btn-inactive:hover{background:rgba(255,255,255,0.80);color:var(--blue)}

/* ── GLASS PANEL (inline container replacement) ── */
.glass-panel{
  background:rgba(255,255,255,0.45);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  backdrop-filter:blur(20px) saturate(180%);
  border:1px solid rgba(255,255,255,0.60);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.70),0 8px 32px 0 rgba(0,0,0,0.08);
  border-radius:12px;
}
.btn-plain{
  background:none;border:none;color:var(--blue);
  font-size:17px;font-weight:400;letter-spacing:-0.4px;
  cursor:pointer;padding:0;
  transition:opacity 0.12s;
}
.btn-plain:active{opacity:0.5}
.bar-btn{
  background:none;border:none;color:var(--blue);
  font-size:17px;font-weight:600;letter-spacing:-0.4px;cursor:pointer;
  padding:0 4px;min-width:44px;min-height:44px;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.12s;
  border-radius:8px;
}
.bar-btn:hover{background:rgba(0,122,255,0.09)}
.bar-btn:active{opacity:0.5}

/* ── FORM INPUTS ── */
.text-field{
  background:transparent;border:none;
  border-bottom:0.5px solid var(--sep);
  width:100%;padding:13px 20px;
  font-size:17px;font-weight:400;letter-spacing:-0.4px;
  color:var(--label);outline:none;
}
.text-field:last-of-type,.text-field-last{border-bottom:none}
.text-field::placeholder{color:var(--label3)}

.text-field-standalone{
  background:var(--glass-light);
  -webkit-backdrop-filter:var(--glass-blur);
  backdrop-filter:var(--glass-blur);
  border:var(--glass-border);
  border-radius:var(--radius-md);
  width:100%;padding:13px 20px;
  font-size:17px;color:var(--label);outline:none;
  display:block;
  box-shadow:var(--glass-shine),var(--shadow-sm);
}
.text-field-standalone::placeholder{color:var(--label3)}
.text-field-standalone:focus{
  outline:none;
  border-color:rgba(0,122,255,0.55);
  box-shadow:var(--glass-shine),0 0 0 3px rgba(0,122,255,0.18),var(--shadow-sm);
}

.form-section{
  background:var(--glass-light);
  -webkit-backdrop-filter:var(--glass-blur);
  backdrop-filter:var(--glass-blur);
  border-radius:var(--radius-md);
  border:var(--glass-border);
  overflow:hidden;
  margin-bottom:24px;
  box-shadow:var(--glass-shine),var(--shadow-sm);
}

/* ── SEARCH BAR ── */
.search-bar-wrap{padding:10px 20px 6px}
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.45);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  backdrop-filter:blur(20px) saturate(180%);
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.60);
  padding:9px 14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.70),0 4px 12px rgba(0,0,0,0.06);
}
.search-bar input{
  background:none;border:none;outline:none;flex:1;
  font-size:17px;color:var(--label);
}
.search-bar input::placeholder{color:var(--label2)}
.search-icon{color:var(--label2);font-size:16px}

/* ── CARDS & SURFACES – Liquid Glass ── */
.card{
  background:var(--glass-light);
  -webkit-backdrop-filter:var(--glass-blur);
  backdrop-filter:var(--glass-blur);
  border-radius:var(--radius-md);
  border:var(--glass-border);
  overflow:hidden;margin-bottom:10px;
  box-shadow:var(--glass-shine),var(--shadow-sm);
}
.card-padded{padding:20px}
.inset-card{
  background:var(--glass-light);
  -webkit-backdrop-filter:var(--glass-blur);
  backdrop-filter:var(--glass-blur);
  border-radius:var(--radius-md);
  border:var(--glass-border);
  padding:20px;margin-bottom:10px;
  box-shadow:var(--glass-shine),var(--shadow-sm);
}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;
  border-radius:980px;padding:4px 12px;
  font-size:12px;font-weight:600;white-space:nowrap;
  letter-spacing:-0.05px;
}

/* ── STATUS PILL COLORS ── */
.status-aufnahme      {background:rgba(88,86,214,0.10);color:#5856D6}
.status-offerte_versendet{background:rgba(255,149,0,0.10);color:#E07800}
.status-offerte_bestaetigt{background:rgba(52,199,89,0.10);color:#248A3D}
.status-teile_arbeit  {background:rgba(0,122,255,0.10);color:#007AFF}
.status-zahlung_versendet{background:rgba(255,149,0,0.10);color:#E07800}
.status-zahlung_erhalten{background:rgba(175,82,222,0.10);color:#9842C8}
.status-abgeschlossen {background:rgba(110,110,115,0.10);color:var(--label2)}


/* ── ALERTS / BANNERS ── */
.alert-banner{
  border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:14px;
  display:flex;align-items:flex-start;gap:12px;
  -webkit-backdrop-filter:blur(14px);
  backdrop-filter:blur(14px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.55),var(--shadow-sm);
}
.alert-warning{background:rgba(255,149,0,0.10);color:#C67000;border:0.5px solid rgba(255,149,0,0.22)}
.alert-danger  {background:rgba(255,59,48,0.09);color:#CC2200;border:0.5px solid rgba(255,59,48,0.22)}

/* ── STAT CARDS – Liquid Glass ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.stat-card{
  background:var(--glass-light);
  -webkit-backdrop-filter:var(--glass-blur);
  backdrop-filter:var(--glass-blur);
  border-radius:var(--radius-lg);
  border:var(--glass-border);
  padding:18px;overflow:hidden;position:relative;
  box-shadow:var(--glass-shine),var(--shadow-md);
}
.stat-icon{font-size:30px;margin-bottom:8px}
.stat-number{font-size:30px;font-weight:700;letter-spacing:-0.5px;line-height:1}
.stat-label{font-size:13px;font-weight:500;color:var(--label2);margin-top:5px;letter-spacing:-0.1px}

/* ── FLOATING CONTEXT MENU – Liquid Glass ── */
.context-menu{
  position:fixed;
  background:rgba(255,255,255,0.55);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  backdrop-filter:blur(20px) saturate(180%);
  border-radius:var(--radius-lg);
  border:1px solid rgba(255,255,255,0.60);
  overflow:hidden;
  z-index:500;
  min-width:240px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.70),0 24px 64px 0 rgba(0,0,0,0.15),0 6px 20px rgba(0,0,0,0.10);
}
.context-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;min-height:48px;
  font-size:17px;font-weight:400;letter-spacing:-0.4px;
  color:var(--label);background:none;border:none;width:100%;cursor:pointer;
  border-bottom:0.5px solid var(--sep);
  gap:10px;
  transition:background 0.1s;
}
.context-item:last-child{border-bottom:none}
.context-item:active{background:rgba(0,0,0,0.06)}
.context-item-icon{font-size:18px;color:var(--label2)}

/* ── MODAL / SHEET – Liquid Glass ── */
.sheet-backdrop{
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,0.20);
  -webkit-backdrop-filter:blur(4px);
  backdrop-filter:blur(4px);
}
.sheet-container{
  position:fixed;left:0;right:0;bottom:0;z-index:401;
  background:rgba(255,255,255,0.45);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  backdrop-filter:blur(20px) saturate(180%);
  border-radius:20px 20px 0 0;
  border-top:1px solid rgba(255,255,255,0.60);
  border-left:1px solid rgba(255,255,255,0.50);
  border-right:1px solid rgba(255,255,255,0.50);
  max-height:96dvh;display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -8px 32px 0 rgba(0,0,0,0.10),inset 0 1px 0 rgba(255,255,255,0.70);
}
.sheet-handle{
  width:40px;height:5px;background:var(--sep-opaque);

  to{transform:translateY(0);opacity:1}
}

/* ── TOAST SYSTEM ── */
/* Global mutable store — no prop drilling needed */
let _toastId=0;
let _toastSetters=null;
function ToastProvider({children}){
  const[toasts,setToasts]=useState([]);
  useEffect(()=>{_toastSetters=setToasts;return()=>{_toastSetters=null;};},[]);
  function dismiss(id){
    setToasts(ts=>ts.map(t=>t.id===id?{...t,out:true}:t));
    setTimeout(()=>setToasts(ts=>ts.filter(t=>t.id!==id)),260);
  }
  return React.createElement(React.Fragment,null
    ,children
    ,React.createElement('div',{className:"toast-stack"}
      ,toasts.map(t=>React.createElement('div',{
          key:t.id,
          className:`toast toast-${t.type}${t.out?" toast-out":""}`,
          role:"status","aria-live":"polite"
        }
        ,React.createElement('span',{className:"toast-icon"},t.icon)
        ,React.createElement('span',{className:"toast-msg"},t.msg)
        ,React.createElement('button',{className:"toast-close",onClick:()=>dismiss(t.id),"aria-label":"Schließen"},"✕")
      ))
    )
  );
}
function showToast(msg,type="info"){
  if(!_toastSetters)return;
  const id=++_toastId;
  const icons={success:"✓",error:"✕",info:"ℹ"};
  // Wait for re-render
  setTimeout(()=>{
    _toastSetters(ts=>[...ts,{id,msg,type,icon:icons[type]||icons.info,out:false}]);
    setTimeout(()=>{
      _toastSetters(ts=>ts.map(t=>t.id===id?{...t,out:true}:t));
      setTimeout(()=>_toastSetters(ts=>ts.filter(t=>t.id!==id)),260);
    },3600);
  },0);
}

    if(!email.trim()||!password.trim())return setError("Bitte alle Felder ausfüllen.");
    setLoading(true);setError("");
    try{
      const res=await auth.signIn(email.trim().toLowerCase(),password);

        setError(_optionalChain([res,'access',x=>x.error,'optionalAccess',x=>x.message])||"E-Mail oder Passwort falsch.");

/* ── KI ZE ESTIMATION ── */
function schaetzeZE(beschreibung){
  const t=beschreibung.toLowerCase();
  const rules=[[/oelwechsel|ölwechsel/,2],[/inspektion|service/,6],[/bremsen|bremsbelag/,4],[/reifen|pneu/,2],[/getriebe/,10],[/kupplung/,8],[/zahnriemen/,8],[/batterie/,1],[/diagnose/,1],[/klima/,3]];
  for(const[re,ze]of rules)if(re.test(t))return String(ze);
  return "1";
}
async function schaetzeZEmitKI(beschreibung,fahrzeug){
  const fz=[fahrzeug.marke,fahrzeug.modell,fahrzeug.kennzeichen,fahrzeug.km?fahrzeug.km+"km":""].filter(Boolean).join(" ")||"unbekannt";
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:150,
      messages:[{role:"user",content:`Du bist Automechaniker Schweiz. Schätze ZE (1 ZE=0.6min) für:\nFahrzeug: ${fz}\nArbeit: ${beschreibung}\nNur JSON: {"ze":<Zahl>,"begruendung":"<max 60 Zeichen>"}`}]})
  });
  const data=await res.json();
  const text=(data.content||[]).map(b=>b.text||"").join("");
  const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
  return{ze:String(Math.round(parsed.ze)),begruendung:parsed.begruendung};
}
