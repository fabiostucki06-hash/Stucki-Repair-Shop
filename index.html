function _optionalChain(ops){let lastAccessLHS=undefined;let value=ops[0];let i=1;while(i<ops.length){const op=ops[i];const fn=ops[i+1];i+=2;if((op==='optionalAccess'||op==='optionalCall')&&value==null)return undefined;if(op==='access'||op==='optionalAccess'){lastAccessLHS=value;value=fn(value)}else if(op==='call'||op==='optionalCall'){value=fn((...args)=>value.call(lastAccessLHS,...args));lastAccessLHS=undefined}}return value}

const h=(token)=>({"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":`Bearer ${token||SUPA_KEY}`});
const auth={
  async signIn(email,password){const r=await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`,{method:"POST",headers:h(),body:JSON.stringify({email,password})});return r.json()},
  async signOut(token){await fetch(`${SUPA_URL}/auth/v1/logout`,{method:"POST",headers:h(token)})},
  async getUser(token){const r=await fetch(`${SUPA_URL}/auth/v1/user`,{headers:h(token)});return r.json()}
};
const db={
  async get(table,token){const r=await fetch(`${SUPA_URL}/rest/v1/${table}?select=*`,{headers:h(token)});return r.json()},
  async upsert(table,obj,token){await fetch(`${SUPA_URL}/rest/v1/${table}`,{method:"POST",headers:{...h(token),"Prefer":"resolution=merge-duplicates"},body:JSON.stringify(obj)})},
  async delete(table,id,token){await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`,{method:"DELETE",headers:h(token)})},
  async getCounter(token){const r=await fetch(`${SUPA_URL}/rest/v1/counters?id=eq.orderNum&select=value`,{headers:h(token)});const d=await r.json();return _optionalChain([d,'access',x=>x[0],'optionalAccess',x=>x.value])||0},
  async setCounter(val,token){await fetch(`${SUPA_URL}/rest/v1/counters?id=eq.orderNum`,{method:"PATCH",headers:h(token),body:JSON.stringify({value:val})})}
};

};
const SO=["aufnahme","offerte_versendet","offerte_bestaetigt","teile_arbeit","zahlung_versendet","zahlung_erhalten","abgeschlossen"];
const daysSince=d=>d?Math.floor((Date.now()-new Date(d).getTime())/86400000):0;
const hoursSince=d=>d?Math.floor((Date.now()-new Date(d).getTime())/3600000):0;
const isOverdue=o=>{
  if(o.status==="offerte_versendet"&&hoursSince(o.statusChangedAt)>48)return true;
  if(o.status==="zahlung_versendet"){const frist=o.zahlungsFrist?parseInt(o.zahlungsFrist):10;if(daysSince(o.statusChangedAt)>frist)return true}
  return false;
};
const needsAttention=o=>o.status!=="abgeschlossen"&&isOverdue(o);
const getActiveStatus=(orders,cid)=>{
  const a=orders.filter(o=>o.customerId===cid&&o.status!=="abgeschlossen");
  if(!a.length)return null;
  return a.sort((x,y)=>new Date(y.createdAt)-new Date(x.createdAt))[0].status;
};
const fmtDate=d=>d?new Date(d).toLocaleDateString("de-CH",{day:"2-digit",month:"2-digit",year:"numeric"}):"–";
const fmtTime=d=>d?`${daysSince(d)<1?hoursSince(d)+"h":daysSince(d)+"T"}`:"";

// ── LOGIN ────────────────────────────────────────────────────────────────────
function LoginPage({onLogin}){
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  async function handleLogin(){
    if(!email.trim()||!password.trim())return setError("Bitte alle Felder ausfüllen.");
    setLoading(true);setError("");
    try{
      const res=await auth.signIn(email.trim().toLowerCase(),password);
      if(res.error||!res.access_token){setError(_optionalChain([res,'access',x=>x.error,'optionalAccess',x=>x.message])||"E-Mail oder Passwort falsch.");setLoading(false);return}
      localStorage.setItem("garage_token",res.access_token);
      localStorage.setItem("garage_email",email.trim().toLowerCase());
      onLogin(res.access_token,email.trim().toLowerCase());
    }catch(e){setError("Verbindungsfehler: "+e.message)}
    setLoading(false);
  }
  return React.createElement('div',{style:{minHeight:"100dvh",background:"linear-gradient(160deg,#0c0f1a 0%,#0f172a 60%,#1e1b4b 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    React.createElement('div',{style:{width:"100%",maxWidth:380,animation:"fadeUp 0.4s ease"}},
      React.createElement('div',{style:{textAlign:"center",marginBottom:32}},
        React.createElement('div',{style:{width:64,height:64,background:"rgba(255,255,255,0.08)",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 14px"}},"🔧"),
        React.createElement('h1',{style:{color:"#fff",fontWeight:800,fontSize:26,letterSpacing:-0.8,marginBottom:4}},"GarageOS"),
        React.createElement('p',{style:{color:"#64748b",fontSize:13}},"Werkstatt Management")
      ),
      React.createElement('div',{style:{background:"#ffffff",borderRadius:18,padding:"28px 24px",boxShadow:"0 24px 64px rgba(0,0,0,0.5)"}},
        React.createElement('h2',{style:{fontSize:17,fontWeight:700,color:"#111827",marginBottom:20,textAlign:"center"}},"Anmelden"),
        error&&React.createElement('div',{style:{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"10px 14px",marginBottom:14,color:"#dc2626",fontWeight:600,fontSize:13}},error),
        React.createElement('div',{style:{marginBottom:14}},
          React.createElement('label',{style:T.lbl},"E-Mail"),
          React.createElement('input',{type:"email",value:email,onChange:e=>setEmail(e.target.value),placeholder:"deine@email.ch",style:{...T.inp},onKeyDown:e=>e.key==="Enter"&&handleLogin()})
        ),
        React.createElement('div',{style:{marginBottom:20}},
          React.createElement('label',{style:T.lbl},"Passwort"),
          React.createElement('input',{type:"password",value:password,onChange:e=>setPassword(e.target.value),placeholder:"••••••••",style:{...T.inp},onKeyDown:e=>e.key==="Enter"&&handleLogin()})
        ),
        React.createElement('button',{onClick:handleLogin,disabled:loading,style:{...T.btnPrimary,opacity:loading?0.7:1}},loading?"Bitte warten…":"Anmelden")
      )
    )
  );
}

function OfferteForm({customers,onSave,onCancel}){
  const[cid,setCid]=useState("");
  const[titel,setTitel]=useState("");
  const[positionen,setPositionen]=useState([{beschreibung:"",menge:"1",preis:"",stunden:""}]);
  const[notizen,setNotizen]=useState("");
  const[gueltigBis,setGueltigBis]=useState("");
  const addPos=()=>setPositionen(p=>[...p,{beschreibung:"",menge:"1",preis:"",stunden:""}]);
  const updPos=(i,k,v)=>setPositionen(p=>{const n=[...p];n[i]={...n[i],[k]:v};return n});
  const remPos=i=>setPositionen(p=>p.filter((_,j)=>j!==i));
  // Auto-berechne Preis aus Stunden
  const handleStunden=(i,v)=>{
    setPositionen(p=>{const n=[...p];n[i]={...n[i],stunden:v,preis:v?String((parseFloat(v)||0)*STUNDENSATZ):n[i].preis};return n});
  };
  const total=positionen.reduce((s,p)=>{const v=parseFloat(p.preis||0)*parseFloat(p.menge||1);return s+(isNaN(v)?0:v)},0);
  function submit(){
    if(!cid)return alert("Bitte Kunden wählen.");
    const pos=positionen.filter(p=>p.beschreibung.trim());
    if(!pos.length)return alert("Mindestens eine Position eingeben.");
    onSave({customerId:cid,titel,positionen:pos,notizen,gueltigBis,totalBetrag:total.toFixed(2)});
  }
  return React.createElement('div',null,
    React.createElement('div',{style:{marginBottom:12}},
      React.createElement('label',{style:T.lbl},"Kunde *"),

        React.createElement('option',{value:""},"— Kunde wählen —"),

    React.createElement(Field,{label:"Titel / Betreff",value:titel,onChange:setTitel,placeholder:"z.B. Jahresservice BMW 320i"}),
    React.createElement('div',{style:{marginBottom:12}},
      React.createElement('label',{style:T.lbl},"Gültig bis"),
      React.createElement('input',{type:"date",value:gueltigBis,onChange:e=>setGueltigBis(e.target.value),style:T.inp})
    ),
    React.createElement('div',{style:{fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:0.6,marginBottom:10}},`Positionen * · Stundensatz: CHF ${STUNDENSATZ}.–`),
    positionen.map((pos,i)=>
      React.createElement('div',{key:i,style:{background:"#f9fafb",borderRadius:10,padding:"12px",marginBottom:8,border:"1px solid #e5e7eb"}},
        React.createElement('input',{value:pos.beschreibung,onChange:e=>updPos(i,"beschreibung",e.target.value),placeholder:"Beschreibung der Arbeit",style:{...T.inp,marginBottom:8}}),
        React.createElement('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr auto",gap:8,alignItems:"flex-end"}},
          React.createElement('div',null,
            React.createElement('label',{style:T.lbl},"Stunden"),
            React.createElement('input',{type:"number",value:pos.stunden,onChange:e=>handleStunden(i,e.target.value),placeholder:"z.B. 2",style:T.inp,step:"0.5",min:"0"})
          ),
          React.createElement('div',null,
            React.createElement('label',{style:T.lbl},"Menge"),
            React.createElement('input',{type:"number",value:pos.menge,onChange:e=>updPos(i,"menge",e.target.value),style:T.inp,min:"1"})
          ),
          React.createElement('div',null,
            React.createElement('label',{style:T.lbl},"Preis CHF"),
            React.createElement('input',{type:"number",value:pos.preis,onChange:e=>updPos(i,"preis",e.target.value),placeholder:"0.00",style:T.inp})
          ),
          React.createElement('button',{onClick:()=>remPos(i),disabled:positionen.length===1,style:{background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:8,width:38,height:38,cursor:"pointer",fontSize:16,flexShrink:0,marginBottom:1}},"✕")
        )
      )

    React.createElement('button',{onClick:addPos,style:{width:"100%",background:"#f9fafb",border:"1.5px dashed #d1d5db",borderRadius:10,padding:"11px",cursor:"pointer",color:"#6b7280",fontWeight:600,marginBottom:14,fontSize:14}},"+ Position hinzufügen"),

                    React.createElement('div',{style:{fontSize:11,color:"#9ca3af"}},fmtDate(o.createdAt))

                  React.createElement('span',{style:{fontSize:16,color:"#d1d5db"}},"›")
                );
              })

        })(),
        !orders.length&&React.createElement('p',{style:{color:"#9ca3af",textAlign:"center",padding:"40px 0",fontSize:13}},"Noch keine Aufträge.")
      ),

      // ── KUNDEN
      tab==="kunden"&&React.createElement('div',null,
        React.createElement(SectionHeader,{title:`Kundenkartei (${customers.length})`}),
        React.createElement('div',{style:{position:"relative",marginBottom:10}},
          React.createElement('input',{value:search,onChange:e=>setSearch(e.target.value),placeholder:"Name, Telefon oder Kennzeichen suchen…",style:{...T.inp,paddingLeft:38,borderRadius:12}}),
          React.createElement('span',{style:{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#9ca3af",pointerEvents:"none"}},"🔍")
        ),
        React.createElement('div',{className:"hscroll",style:{marginBottom:14}},
          [["all","Alle"],["active","Aktive"],["inactive","Inaktive"]].map(([f,l])=>
            React.createElement('button',{key:f,onClick:()=>setFilterK(f),style:{flexShrink:0,padding:"7px 16px",border:`1.5px solid ${filterK===f?"#1d4ed8":"#e5e7eb"}`,borderRadius:20,background:filterK===f?"#1d4ed8":"#ffffff",color:filterK===f?"#ffffff":"#6b7280",fontWeight:600,fontSize:12,cursor:"pointer"}},l)

        filteredC.map(c=>{

            React.createElement('div',{style:{minWidth:0}},
              React.createElement('div',{style:{fontWeight:700,color:"#111827",fontSize:15}},c.vorname+" "+c.nachname),
              React.createElement('div',{style:{fontSize:12,color:"#6b7280"}},c.telefon),
              React.createElement('div',{style:{fontSize:11,color:"#9ca3af",marginTop:1}},"🚗 "+c.kennzeichen+(c.marke?" · "+c.marke:""))
            ),
            React.createElement('div',{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}},
              as?React.createElement(Badge,{status:as,small:true}):React.createElement('span',{style:{fontSize:10,color:"#9ca3af",background:"#f3f4f6",padding:"2px 8px",borderRadius:20,border:"1px solid #e5e7eb",whiteSpace:"nowrap"}},"Inaktiv"),
              React.createElement('span',{style:{fontSize:16,color:"#d1d5db"}},"›")
            )
          );
        })
      )
    ),

    // ── FAB
    fabOpen&&React.createElement('div',{onClick:()=>setFabOpen(false),style:{position:"fixed",inset:0,zIndex:49}}),
    fabOpen&&React.createElement('div',{style:{position:"fixed",bottom:"calc(148px + env(safe-area-inset-bottom))",right:14,zIndex:51,display:"flex",flexDirection:"column",gap:10,alignItems:"flex-end"}},
      React.createElement('button',{onClick:()=>{setShowNC(true);setFabOpen(false)},style:{background:"#ffffff",border:"1px solid #e5e7eb",borderRadius:12,padding:"12px 18px",fontWeight:600,cursor:"pointer",fontSize:14,color:"#111827",boxShadow:"0 4px 16px rgba(0,0,0,0.1)",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:8}},
        React.createElement('span',{style:{fontSize:16}},"👤"),"Neuer Kunde"
      ),
      React.createElement('button',{onClick:()=>{setNewOCid(null);setShowNO(true);setFabOpen(false)},style:{background:"#ffffff",border:"1px solid #e5e7eb",borderRadius:12,padding:"12px 18px",fontWeight:600,cursor:"pointer",fontSize:14,color:"#111827",boxShadow:"0 4px 16px rgba(0,0,0,0.1)",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:8}},
        React.createElement('span',{style:{fontSize:16}},"🔧"),"Neuer Auftrag"
      )
    ),
    React.createElement('button',{className:"fab",onClick:()=>setFabOpen(p=>!p),style:{bottom:"calc(72px + env(safe-area-inset-bottom))",transform:fabOpen?"rotate(45deg)":"rotate(0deg)"}},"＋"),

    // ── BOTTOM NAV
    React.createElement('div',{style:{position:"fixed",bottom:0,left:0,right:0,background:"#ffffff",borderTop:"1px solid #e5e7eb",display:"flex",zIndex:100,boxShadow:"0 -1px 0 rgba(0,0,0,0.04)",paddingBottom:"env(safe-area-inset-bottom)"}},
      navBtn("dashboard","🏠","Dashboard"),
      navBtn("auftraege","🔧","Aufträge"),
      navBtn("offerten","📄","Offerten"),
      navBtn("kunden","👥","Kunden")
    ),

    // ── MODALS
    afterSave&&!showNO&&(()=>{
      const c=customers.find(x=>x.id===afterSave);
      return React.createElement(Modal,{title:"Kunde gespeichert",onClose:()=>setAfterSave(null)},
        React.createElement('div',{style:{textAlign:"center",paddingBottom:8}},
          React.createElement('div',{style:{fontSize:44,marginBottom:10}},"✅"),
          React.createElement('p',{style:{color:"#4b5563",marginBottom:20,fontSize:15}},"Direkt einen Auftrag für ",React.createElement('strong',null,_optionalChain([c,'optionalAccess',x=>x.vorname])+" "+_optionalChain([c,'optionalAccess',x=>x.nachname]))," erstellen?")
        ),
        React.createElement('button',{onClick:()=>{setNewOCid(afterSave);setShowNO(true)},style:{...T.btnPrimary,marginBottom:10}},"+ Auftrag erstellen"),
        React.createElement('button',{onClick:()=>setAfterSave(null),style:T.btnSecondary},"Später")
      );
    })(),
    showNOff&&React.createElement(Modal,{title:"Neue Offerte",onClose:()=>setShowNOff(false)},React.createElement(OfferteForm,{customers,onSave:addOfferte,onCancel:()=>setShowNOff(false)})),
    selOff&&React.createElement(OfferteDetail,{offerte:selOff,customer:customers.find(c=>c.id===selOff.customerId),onClose:()=>setSelOff(null),onUpdate:updateOfferte,onDelete:deleteOfferte}),
    showNO&&React.createElement(Modal,{title:"Neuer Auftrag",onClose:()=>{setShowNO(false);setNewOCid(null)}},React.createElement(OrderForm,{customers,customerId:newOCid,onSave:addOrder,onCancel:()=>{setShowNO(false);setNewOCid(null)}})),
    selC&&!selO&&React.createElement(CustomerDetail,{customer:selC,orders,onClose:()=>setSelC(null),onEdit:()=>setEditC(selC),onNewOrder:()=>{setNewOCid(selC.id);setShowNO(true);setSelC(null)},onOrderClick:o=>{setSelO(o);setSelC(null)}}),
    editC&&React.createElement(Modal,{title:"Kunde bearbeiten",onClose:()=>setEditC(null)},React.createElement(CustomerForm,{initial:editC,onSave:async data=>{await updateCustomer(editC.id,data);setEditC(null)},onCancel:()=>setEditC(null)})),
    selO&&React.createElement(OrderDetail,{order:selO,customer:customers.find(c=>c.id===selO.customerId),onClose:()=>setSelO(null),onUpdate:updateOrder,onDelete:deleteOrder})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
